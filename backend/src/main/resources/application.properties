spring.application.name=satuAi

# Server Configuration
server.port=8080

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:satudb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# LLM Configuration (OpenAI API)
# Set these via environment variables or system properties for security
# DEMO MODE: Set llm.demo-mode=true to use demo responses without API key
llm.demo-mode=true
llm.provider=openai
llm.api.key=${LLM_API_KEY:your-api-key-here}
llm.api.url=https://api.openai.com/v1/chat/completions
llm.model=gpt-3.5-turbo
llm.max-tokens=500
llm.temperature=0.7

# Hugging Face Configuration (Free API - Recommended)
# Get free API key from: https://huggingface.co/settings/tokens
# No credit card needed!
hf.api.key=${HF_API_KEY:your-hf-api-key}

# Logging
logging.level.root=INFO
logging.level.com.satruai=DEBUG

# ==================== STEP 3: VOICE SUPPORT ====================

# Voice Service Configuration (OpenAI Whisper + TTS)
voice.provider=openai
voice.api.key=${LLM_API_KEY:your-api-key-here}
voice.whisper.model=whisper-1
voice.tts.model=tts-1
voice.tts.voice=nova

# Audio Storage
voice.storage.path=${user.home}/satu-ai/audio
voice.storage.max-file-size=26214400
voice.storage.cleanup-enabled=true
voice.storage.retention-days=30

# Audio Format
voice.audio.format=mp3
voice.audio.sample-rate=16000
voice.audio.bit-depth=16

# Performance
voice.api.timeout=30s
voice.api.max-retries=3

# Multipart File Upload
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
