spring.application.name=satuAi

# Server Configuration
server.port=8080

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:satudb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# LLM Configuration (OpenAI API)
# Set these via environment variables or system properties for security
llm.provider=openai
llm.api.key=${LLM_API_KEY:your-api-key-here}
llm.api.url=https://api.openai.com/v1/chat/completions
llm.model=gpt-3.5-turbo
llm.max-tokens=500
llm.temperature=0.7

# Logging
logging.level.root=INFO
logging.level.com.satruai=DEBUG

